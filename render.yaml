services:
  - type: web
    name: weddingcraft
    env: node
    plan: starter
    buildCommand: npm install && npm run db:init
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: weddingcraft-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://weddingcraft.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
databases:
  - name: weddingcraft-db
    plan: starter
    databaseName: weddingcraft
    user: weddingcraft
